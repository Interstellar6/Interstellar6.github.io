<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>relumeow.top</title>
    <meta name="description" content="多项目文档、调研和运行记录的统一入口。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="workspace-shell">
      <aside class="project-rail" aria-label="项目文档目录">
        <a class="site-brand" href="/home/" aria-label="relumeow.top home">
          <span class="site-wordmark">relumeow.top</span>
        </a>
        <section class="rail-section directory-section">
          <div class="rail-heading">
            <span>Directory</span>
          </div>
          <nav id="directoryTree" class="directory-tree"></nav>
        </section>
      </aside>

      <main class="content-shell">
        <header class="content-topbar">
          <div>
            <p id="routeLabel" class="route-label">Home</p>
            <h1 id="pageTitle">relumeow.top</h1>
          </div>
          <div class="topbar-actions">
            <div class="search-box">
              <input id="searchInput" type="search" placeholder="Search docs" />
              <span>⌘K</span>
            </div>
            <div class="account-menu">
              <button id="accountButton" class="account-button" type="button" aria-haspopup="dialog" aria-expanded="false">
                <span id="accountAvatar" class="account-avatar">访</span>
                <span id="accountLabel">访客</span>
              </button>
              <section id="accountPopover" class="account-popover" hidden></section>
            </div>
          </div>
        </header>

        <section id="homeView" class="home-view"></section>
        <section id="projectView" class="project-view" hidden>
          <article id="documentPanel" class="document-panel"></article>
        </section>
        <section id="loginView" class="login-view" hidden></section>
        <section id="adminView" class="admin-view" hidden></section>
      </main>
    </div>
    <script src="./site-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
