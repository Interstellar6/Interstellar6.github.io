<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>relumeow.top</title>
    <meta name="description" content="多项目文档、调研和运行记录的统一入口。" />
    <meta name="color-scheme" content="dark light" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" crossorigin="anonymous" />
    <script>
      try {
        const savedTheme = localStorage.getItem("relumeow-theme-v1");
        document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
      } catch (_error) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="workspace-shell">
      <button id="railToggle" class="rail-toggle" type="button" aria-label="隐藏目录" aria-pressed="false">
        <span aria-hidden="true"></span>
      </button>
      <aside class="project-rail" aria-label="项目文档目录">
        <a class="site-brand" href="/home/" aria-label="relumeow.top home">
          <span class="site-wordmark">relumeow.top</span>
        </a>
        <section class="rail-section directory-section">
          <div class="rail-heading">
            <span>Directory</span>
            <div class="directory-mode-toggle" role="group" aria-label="目录视图">
              <button id="directoryContentMode" type="button" aria-pressed="true">内容</button>
              <button id="directoryDateMode" type="button" aria-pressed="false">日期</button>
            </div>
          </div>
          <nav id="directoryTree" class="directory-tree"></nav>
        </section>
      </aside>
      <div id="railResizer" class="rail-resizer" role="separator" aria-label="调整目录宽度" aria-orientation="vertical" tabindex="0"></div>

      <main class="content-shell">
        <header class="content-topbar">
          <div>
            <p id="routeLabel" class="route-label">Home</p>
            <h1 id="pageTitle">relumeow.top</h1>
          </div>
          <div class="topbar-actions">
            <a id="projectDemoLink" class="ghost-button project-demo-link" href="/video2mesh/web-demo/" hidden>Web Demo</a>
            <div class="search-box">
              <input id="searchInput" type="search" placeholder="Search docs" />
              <span>⌘K</span>
            </div>
            <button id="themeToggle" class="theme-button" type="button" aria-label="切换白天模式">
              <span class="theme-icon" aria-hidden="true"></span>
              <span id="themeLabel">白天</span>
            </button>
            <div class="account-menu">
              <button id="accountButton" class="account-button" type="button" aria-haspopup="dialog" aria-expanded="false">
                <span id="accountAvatar" class="account-avatar">访</span>
                <span id="accountLabel">访客</span>
              </button>
              <section id="accountPopover" class="account-popover" hidden></section>
            </div>
          </div>
        </header>

        <section id="homeView" class="home-view"></section>
        <section id="projectView" class="project-view" hidden>
          <article id="documentPanel" class="document-panel"></article>
        </section>
        <section id="loginView" class="login-view" hidden></section>
        <section id="adminView" class="admin-view" hidden></section>
      </main>

      <button id="tocEdgeToggle" class="toc-edge-toggle" type="button" aria-label="隐藏标题导航" aria-pressed="false">
        <span aria-hidden="true"></span>
      </button>
      <div id="tocResizer" class="toc-resizer" role="separator" aria-label="调整标题导航宽度" aria-orientation="vertical" tabindex="0"></div>
      <aside class="outline-rail" aria-label="当前文档标题导航">
        <div class="outline-head">
          <span>Outline</span>
          <button id="tocToggle" class="toc-toggle" type="button" aria-label="隐藏标题导航" aria-pressed="false">
            <span aria-hidden="true"></span>
          </button>
        </div>
        <nav id="outlineTree" class="outline-tree"></nav>
      </aside>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="./site-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
