name: Deploy relumeow.top

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: relumeow-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central site
        uses: actions/checkout@v4
        with:
          path: interstellar6.github.io

      - name: Checkout Video2Mesh docs source
        uses: actions/checkout@v4
        with:
          repository: Interstellar6/Video2Mesh
          path: Video2Mesh

      - name: Checkout ChallengeCup docs source
        uses: actions/checkout@v4
        with:
          repository: MIL-ChallengeCup-Team1/test-agent-system
          ref: dev
          path: ChallengeCup

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: python -m pip install pyyaml

      - name: Build static shell
        working-directory: interstellar6.github.io
        run: |
          python build_site.py
          rm -rf _site/_protected

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: interstellar6.github.io/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
