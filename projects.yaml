site:
  title: relumeow.top
  description: 多项目文档、调研和运行记录的统一入口。
  default_route: /home/
  api_url: https://api.relumeow.top
  access_api_url: same-origin
  nav:
    - label: Home
      route: /home/

projects:
  - slug: video2mesh
    route: /video2mesh/
    title: Video2Mesh
    brand: Video2Mesh
    mark: V2M
    subtitle: Field Notes
    description: 从扫描视频到可交互 3D 场景资产的项目文档、技术调研和运行记录。
    access:
      mode: public
      realm: video2mesh
      label: Video2Mesh 项目空间
    source:
      repo: ../Video2Mesh
      docs_root: docs/video2mesh
    navigation:
      directory_overview: overview.md
      hide_overview_from_child_list: true
      directory_order:
        - research-catalog
        - progress
        - project-docs
      directory_labels:
        research-catalog: 调研文档目录
        progress: 项目进度文档目录
        project-docs: 项目运行文档目录
    pinned_docs:
      - README.md
      - project-docs/overview.md
      - research-catalog/overview.md
      - progress/overview.md
    catalog:
      category: 调研目录
      root: research-catalog/
      stages:
        - key: input-pose-pointcloud
          title: 输入、位姿与点云
          summary: 视频抽帧、COLMAP/MVS、VGGT/VGGT-Omega learned pose fallback、稠密点云和坐标尺度合同。
          image: assets/uploaded/video2mesh-research-catalog/pipeline-overview.svg
          tags: [COLMAP, VGGT-Omega, Point Cloud, Pose]
        - key: visual-3dgs
          title: 视觉重建 / 3DGS
          summary: GraphDECO 3DGS、Spark、SuperSplat 和 visual proxy 的工程边界。
          image: assets/uploaded/video2mesh-research-catalog/pipeline-overview.svg
          tags: [3DGS, Spark, SuperSplat]
        - key: mesh-reconstruction
          title: Mesh 重建
          summary: COLMAP Delaunay、Poisson、GS2Mesh、SuGaR、2DGS/GOF 的阶段定位。
          image: assets/uploaded/video2mesh-research-catalog/stage-mesh.svg
          tags: [Mesh, GS2Mesh, SuGaR]
        - key: dynamic-4d-reconstruction
          title: 动态 / 4D 重建
          summary: D4RT、动态 depth/camera/tracks、动态点云和 per-object trajectory sidecar。
          image: assets/uploaded/video2mesh-research-catalog/stage-dynamic-4d.svg
          tags: [D4RT, 4D Reconstruction, Tracking]
        - key: semantic-scene-graph
          title: 语义与 Scene Graph
          summary: SAM/Grounded-SAM、semantic splats、mesh face sidecar 和交互查询。
          image: assets/uploaded/video2mesh-research-catalog/stage-semantics.svg
          tags: [Semantics, Scene Graph]
        - key: experiments
          title: 本项目实验
          summary: GS2Mesh、Open3D Poisson、COLMAP Delaunay、语义投影和 Web demo。
          image: assets/uploaded/video2mesh-experiments/04-visual-physics-proxy-demo.png
          tags: [Experiments, Video2Mesh]
    reading_paths:
      - title: 项目文档
        tags: [项目文档, Video2Mesh]
        query: pipeline
      - title: 调研目录
        tags: [调研目录, Research Catalog]
        query: mesh
      - title: 进度目录
        tags: [进度目录, Weekly]
        query: weekly

  - slug: video2world
    route: /video2world/
    title: Video2World
    brand: Video2World
    mark: V2W
    subtitle: Interactive Gaussian Worlds
    description: 从扫描视频构建分层、可交互、可查询 3D 世界的 Pipeline、资产合同与真实运行记录。
    access:
      mode: public
      realm: video2world
      label: Video2World 项目空间
    demo:
      href: /video2world/web-demo/
      label: Web Demo
    build:
      demo:
        source: ../video2world/dist/web
        rewrite_root_asset_urls: true
        default_manifest: worlds/bedroom4/manifest.json
        stable_manifest: worlds/bedroom4/manifest.web-demo-baseline-stable.json
        max_file_bytes: 26214400
        exclude:
          - "*.map"
          - test-fixtures
          - gaussian-review.html
          - object-review.html
          - assets/gaussianReview-*
          - assets/objectReview-*
          - assets/object-review-*
          - worlds/*/qa/screenshots
          - worlds/*/qa/unified-pillow-browser
          - worlds/*/recarve-candidates
          - worlds/bedroom4/colliders/collider_bedroom4_tsdf_static_carved_unified_pillow.ply
    source:
      repo: ../video2world
      docs_root: docs/video2world
    navigation:
      directory_overview: overview.md
      hide_overview_from_child_list: true
      directory_order:
        - project-docs
        - research-catalog
        - progress
      directory_labels:
        project-docs: 项目文档
        research-catalog: 调研与架构
        progress: 真实运行与 QA
    pinned_docs:
      - README.md
      - project-docs/pipeline.md
      - project-docs/completion.md
      - project-docs/getting-started.md
      - research-catalog/architecture.md
      - progress/bedroom4-20260716.md
    catalog:
      category: 调研目录
      root: research-catalog/
      stages:
        - key: scene-reconstruction
          title: 场景重建
          summary: DA3 几何先验、PGSR 30k Gaussian 与 TSDF scene mesh 的职责和真实统计。
          image: assets/uploaded/video2world-video2world-project-pipeline/01-pgsr-scene.png
          tags: [DA3, PGSR, 3DGS, TSDF]
        - key: semantic-lifting
          title: 开放词汇语义与 3D Fusion
          summary: SAM3 二维证据、多视角概率回投、对象点云、bbox 与 semantic Gaussian。
          image: assets/uploaded/video2world-video2world-project-pipeline/06-semantic-gaussian.png
          tags: [SAM3, Open Vocabulary, Semantic 3DGS]
        - key: object-completion
          title: 独立物体补全
          summary: EmbodiedGen V2/TRELLIS object Gaussian、GLB/OBJ、场景对齐和碰撞门禁。
          image: assets/uploaded/video2world-video2world-project-pipeline/08-plant-gaussian.png
          tags: [EmbodiedGen V2, TRELLIS, GLB]
        - key: interactive-runtime
          title: 可交互 Web 世界
          summary: Spark 视觉层、MeshBVH 碰撞层、机器人、对象旋转与场景认知问答。
          image: assets/uploaded/video2world-video2world-project-pipeline/13-web-production-overview.png
          tags: [Spark, Three.js, MeshBVH, Scene QA]
    reading_paths:
      - title: 十二阶段 Pipeline
        tags: [Pipeline, 3DGS, SAM3]
        query: Pipeline
      - title: World Manifest 与门禁
        tags: [Schema, Provenance, Quality Gates]
        query: manifest
      - title: bedroom_4 实测
        tags: [bedroom_4, QA, Real Run]
        query: bedroom_4

  - slug: challengecup-agent-system
    route: /challengecup-agent-system/
    title: ChallengeCup Agent System
    brand: ChallengeCup
    mark: CC
    subtitle: Agent System
    description: 多模态模型协同自主智能体系统的赛题分析、技术调研、进度和项目使用文档。
    access:
      mode: passcode
      realm: challengecup-agent-system
      label: ChallengeCup 项目空间
    source:
      repo: ../ChallengeCup
      docs_root: docs/challengecup-agent-system
    navigation:
      directory_overview: overview.md
      hide_overview_from_child_list: true
      directory_order:
        - contest-analysis
        - research-catalog
        - progress
        - project-docs
      directory_labels:
        contest-analysis: 赛题分析目录
        research-catalog: 调研文档目录
        progress: 项目进度文档目录
        project-docs: 项目运行文档目录
    pinned_docs:
      - README.md
      - contest-analysis/README.md
      - research-catalog/README.md
      - progress/README.md
      - project-docs/README.md
    catalog:
      category: 调研目录
      root: research-catalog/
      stages:
        - key: target-detection
          title: 目标检测
          summary: YOLOv8、FPN、多尺度输入、SAHI 和 tiny soldier 检测瓶颈。
          image: assets/uploaded/challengecup-research-catalog/research-catalog-pipeline.svg
          tags: [YOLOv8, FPN, SAHI]
        - key: scene-cognition
          title: 场景认知
          summary: Places365、EfficientNet、MobileCLIP 和 air/sea/urban/forest 场景标签。
          image: assets/uploaded/challengecup-places365-resnet50/scene-cognition-pipeline.svg
          tags: [Places365, EfficientNet, MobileCLIP]
        - key: task-decision-postprocess
          title: 任务决策与后处理
          summary: 场景先验、precision policy、WBF、Model Soups、candidate gate。
          image: assets/uploaded/challengecup-model-soups/model-soups-pipeline.svg
          tags: [Policy, WBF, Model Soups]
        - key: data-engine-semisupervised
          title: 数据闭环与半监督
          summary: Teacher-Student、Grounding DINO、Copy-Paste、错例审计和数据回流。
          image: assets/uploaded/challengecup-soft-teacher/teacher-student-pipeline.svg
          tags: [Teacher, Pseudo Label, Copy-Paste]
        - key: deployment
          title: 端侧部署
          summary: YOLO 权重导出 ONNX，经 CANN/ATC 转换为 Ascend 310B 可运行 OM。
          image: assets/uploaded/challengecup-ascend-cann-atc/ascend-deploy-pipeline.svg
          tags: [Ascend, ONNX, ATC]
    reading_paths:
      - title: 赛题分析目录
